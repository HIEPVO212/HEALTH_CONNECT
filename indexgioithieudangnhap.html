<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthConnect - Giới thiệu & Đăng nhập</title>
    <!-- Bootstrap & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- File CSS riêng -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="fw-bold text-info fs-3" onclick="navigate('intro')" style="cursor:pointer">HEALTHCONNECT</div>
            <div class="menu-toggle d-lg-none" onclick="toggleMenu()"><i class="fas fa-bars fs-2 text-info"></i></div>
            <div class="nav-links-wrapper" id="navMenu">
                <a class="nav-item-custom" id="nav-intro" onclick="navigate('intro')">Giới thiệu</a>
                <a class="nav-item-custom" id="nav-auth" onclick="navigate('auth')">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <div class="page-container">
        
        <!-- TRANG GIỚI THIỆU -->
        <section id="intro" class="page-content">
            <div class="cyan-header">Về Chúng Tôi</div>
            <div class="intro-body text-center">
                <h2 class="mb-4 text-info fw-bold">Chào mừng tới HealthConnect</h2>
                <p class="text-muted mb-5">Giải pháp công nghệ giúp bạn kết nối với y bác sĩ nhanh chóng.</p>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <div class="feature-box">
                            <i class="fas fa-clock"></i>
                            <h5>Tiết kiệm thời gian</h5>
                            <p class="small text-muted">Đặt lịch khám chỉ với vài cú chạm.</p>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="feature-box">
                            <i class="fas fa-heartbeat"></i>
                            <h5>Chăm sóc tận tâm</h5>
                            <p class="small text-muted">Đội ngũ y bác sĩ giàu kinh nghiệm.</p>
                        </div>
                    </div>
                </div>
                <button class="btn btn-info text-white px-5 py-2 mt-3" onclick="navigate('auth')">Đăng nhập để bắt đầu</button>
            </div>
        </section>

        <!-- TRANG ĐĂNG NHẬP -->
        <section id="auth" class="page-content">
            <div class="cyan-header">Đăng Nhập</div>
            <div class="auth-form">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-4x text-info"></i>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Tài khoản</label>
                    <input type="text" id="username" class="form-control" placeholder="Email hoặc Số điện thoại">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu">
                </div>
                <button class="btn btn-info text-white w-100 py-2 mt-2" onclick="handleLogin()">ĐĂNG NHẬP</button>
            </div>
        </section>

    </div>

    <!-- File JavaScript riêng -->
    <script src="script.js"></script>
</body>
</html>
